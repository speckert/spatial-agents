<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Map — Spatial Agents</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0e17;
    --bg-panel: rgba(17, 24, 39, 0.92);
    --border: #2a3650;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-cyan: #06b6d4;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-deep); font-family: var(--font-body); }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

  /* --- Header bar --- */
  .header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    background: var(--bg-panel); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 1.25rem; height: 48px;
  }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  .header-title {
    font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500;
    color: var(--accent-cyan); letter-spacing: 0.08em; text-transform: uppercase;
    text-decoration: none;
  }
  .header-title:hover { text-decoration: underline; }
  .header-subtitle {
    font-size: 0.8rem; color: var(--text-muted);
  }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .vessel-count {
    font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary);
  }
  .vessel-count strong { color: var(--accent-cyan); }
  .nav-link {
    font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.05em;
    padding: 0.35rem 0.8rem; border-radius: 5px; border: 1px solid var(--border);
    color: var(--text-secondary); text-decoration: none; transition: all 0.2s;
  }
  .nav-link:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #10b981;
    display: inline-block; margin-right: 0.35rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* --- Info panel (click a vessel) --- */
  .info-panel {
    position: absolute; bottom: 1.5rem; left: 1.25rem; z-index: 10;
    background: var(--bg-panel); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 1.25rem 1.5rem; min-width: 280px; max-width: 340px;
    display: none;
  }
  .info-panel.visible { display: block; }
  .info-panel h3 {
    font-size: 0.95rem; font-weight: 600; color: var(--text-primary);
    margin-bottom: 0.5rem;
  }
  .info-row {
    display: flex; justify-content: space-between; padding: 0.25rem 0;
    font-size: 0.8rem;
  }
  .info-label { color: var(--text-muted); }
  .info-value { color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.75rem; }
  .info-close {
    position: absolute; top: 0.5rem; right: 0.75rem;
    background: none; border: none; color: var(--text-muted);
    font-size: 1.1rem; cursor: pointer; line-height: 1;
  }
  .info-close:hover { color: var(--text-primary); }

  /* --- Legend --- */
  .legend {
    position: absolute; bottom: 1.5rem; right: 1.25rem; z-index: 10;
    background: var(--bg-panel); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0.75rem 1rem; font-size: 0.7rem;
  }
  .legend-item {
    display: flex; align-items: center; gap: 0.5rem; padding: 0.2rem 0;
    color: var(--text-secondary);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }

  @media (max-width: 768px) {
    .info-panel { left: 0.75rem; right: 0.75rem; min-width: auto; max-width: none; }
    .legend { display: none; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="header">
  <div class="header-left">
    <a href="index.html" class="header-title">Spatial Agents</a>
    <span class="header-subtitle">San Francisco Bay — Live Vessels</span>
  </div>
  <div class="header-right">
    <span class="vessel-count"><span class="status-dot"></span><strong id="count">—</strong> vessels</span>
    <a href="dag.html" class="nav-link">Causal DAG</a>
    <a href="index.html" class="nav-link">Overview</a>
  </div>
</div>

<div class="info-panel" id="info">
  <button class="info-close" onclick="document.getElementById('info').classList.remove('visible')">&times;</button>
  <h3 id="info-name">—</h3>
  <div class="info-row"><span class="info-label">MMSI</span><span class="info-value" id="info-mmsi">—</span></div>
  <div class="info-row"><span class="info-label">Type</span><span class="info-value" id="info-type">—</span></div>
  <div class="info-row"><span class="info-label">Speed</span><span class="info-value" id="info-speed">—</span></div>
  <div class="info-row"><span class="info-label">Heading</span><span class="info-value" id="info-heading">—</span></div>
  <div class="info-row"><span class="info-label">Course</span><span class="info-value" id="info-course">—</span></div>
  <div class="info-row"><span class="info-label">Destination</span><span class="info-value" id="info-dest">—</span></div>
  <div class="info-row"><span class="info-label">Updated</span><span class="info-value" id="info-time">—</span></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f43f5e"></div>Tanker</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Cargo</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Passenger</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Tug</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>Fishing</div>
  <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Other</div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const API = window.location.hostname === 'agents.specktech.com'
  ? ''
  : 'http://127.0.0.1:8012';
const H3_CELL = '832830fffffffff';
const RESOLUTION = 3;
const REFRESH_MS = 30000;

const TYPE_COLORS = {
  tanker:      '#f43f5e',
  cargo:       '#3b82f6',
  passenger:   '#10b981',
  tug:         '#f59e0b',
  fishing:     '#8b5cf6',
  military:    '#ef4444',
  sailing:     '#a78bfa',
  pleasure:    '#fb923c',
  high_speed:  '#22d3ee',
  other:       '#06b6d4',
  unknown:     '#64748b',
};

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'carto-dark': {
        type: 'raster',
        tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
        tileSize: 256,
        attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
      }
    },
    layers: [{
      id: 'carto-dark',
      type: 'raster',
      source: 'carto-dark',
      minzoom: 0,
      maxzoom: 19,
    }],
  },
  center: [-122.35, 37.80],
  zoom: 11,
  maxZoom: 18,
  minZoom: 8,
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');

function vesselToFeature(v) {
  return {
    type: 'Feature',
    geometry: {
      type: 'Point',
      coordinates: [v.position.lng, v.position.lat],
    },
    properties: {
      mmsi: v.mmsi,
      name: v.name || 'Unknown',
      vessel_type: v.vessel_type || 'unknown',
      speed: v.speed_knots,
      heading: v.heading_deg,
      course: v.course_deg,
      destination: v.destination || '',
      timestamp: v.position.timestamp,
      color: TYPE_COLORS[v.vessel_type] || TYPE_COLORS.unknown,
      rotation: (v.heading_deg != null && v.heading_deg !== 511) ? v.heading_deg : (v.course_deg || 0),
    },
  };
}

async function fetchVessels() {
  try {
    const res = await fetch(`${API}/api/vessels/${H3_CELL}?resolution=${RESOLUTION}`);
    const data = await res.json();
    document.getElementById('count').textContent = data.count;
    return data.vessels.map(vesselToFeature);
  } catch (e) {
    console.error('Fetch error:', e);
    return null;
  }
}

function updateMap(features) {
  if (!features) return;
  const geojson = { type: 'FeatureCollection', features };
  const src = map.getSource('vessels');
  if (src) {
    src.setData(geojson);
  } else {
    map.addSource('vessels', { type: 'geojson', data: geojson });

    // Glow layer
    map.addLayer({
      id: 'vessel-glow',
      type: 'circle',
      source: 'vessels',
      paint: {
        'circle-radius': 12,
        'circle-color': ['get', 'color'],
        'circle-opacity': 0.15,
        'circle-blur': 1,
      },
    });

    // Main dot
    map.addLayer({
      id: 'vessel-dots',
      type: 'circle',
      source: 'vessels',
      paint: {
        'circle-radius': [
          'interpolate', ['linear'], ['zoom'],
          8, 3,
          12, 5,
          16, 8,
        ],
        'circle-color': ['get', 'color'],
        'circle-opacity': 0.9,
        'circle-stroke-width': 1,
        'circle-stroke-color': 'rgba(255,255,255,0.3)',
      },
    });

    // Labels at higher zoom
    map.addLayer({
      id: 'vessel-labels',
      type: 'symbol',
      source: 'vessels',
      minzoom: 13,
      layout: {
        'text-field': ['get', 'name'],
        'text-size': 11,
        'text-offset': [0, 1.4],
        'text-anchor': 'top',
        'text-font': ['Open Sans Regular'],
      },
      paint: {
        'text-color': '#94a3b8',
        'text-halo-color': '#0a0e17',
        'text-halo-width': 1,
      },
    });

    // Click handler
    map.on('click', 'vessel-dots', (e) => {
      const p = e.features[0].properties;
      document.getElementById('info-name').textContent = p.name;
      document.getElementById('info-mmsi').textContent = p.mmsi;
      document.getElementById('info-type').textContent = p.vessel_type;
      document.getElementById('info-speed').textContent =
        p.speed != null ? p.speed.toFixed(1) + ' kn' : '—';
      document.getElementById('info-heading').textContent =
        (p.heading != null && p.heading !== 511) ? p.heading.toFixed(0) + '\u00B0' : '—';
      document.getElementById('info-course').textContent =
        p.course != null ? p.course.toFixed(0) + '\u00B0' : '—';
      document.getElementById('info-dest').textContent = p.destination || '—';
      const t = p.timestamp ? new Date(p.timestamp) : null;
      document.getElementById('info-time').textContent =
        t ? t.toLocaleTimeString() : '—';
      document.getElementById('info').classList.add('visible');
    });

    map.on('mouseenter', 'vessel-dots', () => {
      map.getCanvas().style.cursor = 'pointer';
    });
    map.on('mouseleave', 'vessel-dots', () => {
      map.getCanvas().style.cursor = '';
    });
  }
}

map.on('load', async () => {
  const features = await fetchVessels();
  updateMap(features);
  setInterval(async () => {
    const f = await fetchVessels();
    updateMap(f);
  }, REFRESH_MS);
});
</script>

</body>
</html>
