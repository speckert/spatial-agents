<!DOCTYPE html>
<!--
  Live Map — Spatial Agents

  Version History:
    0.1.0  2026-03-28  Initial MapLibre map with vessel + aircraft layers
    0.2.0  2026-04-09  Centralized coverage bbox from /health
    0.3.0  2026-04-24  Multi-region switcher (SF + Boston) + Other button
                       redirecting to MarineTraffic — Claude Opus 4.6
    0.4.0  2026-04-25  Coverage rendered as the 7-cell H3 region tile
                       (primary cell solid, six buffer cells dashed) instead
                       of a bbox rectangle. Per-region counts filter by
                       res-4 cell membership rather than bbox — Claude 4.7
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Map — Spatial Agents</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0e17;
    --bg-panel: rgba(17, 24, 39, 0.92);
    --border: #2a3650;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-cyan: #06b6d4;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-deep); font-family: var(--font-body); }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

  .header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    background: var(--bg-panel); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 1.25rem; height: 48px;
  }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  .header-title {
    font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500;
    color: var(--accent-cyan); letter-spacing: 0.08em; text-transform: uppercase;
    text-decoration: none;
  }
  .header-title:hover { text-decoration: underline; }
  .header-subtitle { font-size: 0.8rem; color: var(--text-muted); }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .entity-count {
    font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary);
  }
  .entity-count strong { color: var(--accent-cyan); }
  .nav-link {
    font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.05em;
    padding: 0.35rem 0.8rem; border-radius: 5px; border: 1px solid var(--border);
    color: var(--text-secondary); text-decoration: none; transition: all 0.2s;
  }
  .nav-link:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .region-btn {
    font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.05em;
    padding: 0.35rem 0.8rem; border-radius: 5px; border: 1px solid var(--border);
    color: var(--text-secondary); background: none; cursor: pointer; transition: all 0.2s;
  }
  .region-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .region-btn.active { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(6, 182, 212, 0.1); }
  #region-switcher { display: flex; gap: 0.4rem; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #10b981;
    display: inline-block; margin-right: 0.35rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .info-panel {
    position: absolute; bottom: 1.5rem; left: 1.25rem; z-index: 10;
    background: var(--bg-panel); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 1.25rem 1.5rem; min-width: 280px; max-width: 340px;
    display: none;
  }
  .info-panel.visible { display: block; }
  .info-panel h3 {
    font-size: 0.95rem; font-weight: 600; color: var(--text-primary);
    margin-bottom: 0.1rem;
  }
  .info-panel .info-kind {
    font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 0.5rem;
  }
  .info-kind.vessel { color: #06b6d4; }
  .info-kind.aircraft { color: #f59e0b; }
  .info-row {
    display: flex; justify-content: space-between; padding: 0.25rem 0;
    font-size: 0.8rem;
  }
  .info-label { color: var(--text-muted); }
  .info-value { color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.75rem; }
  .info-close {
    position: absolute; top: 0.5rem; right: 0.75rem;
    background: none; border: none; color: var(--text-muted);
    font-size: 1.1rem; cursor: pointer; line-height: 1;
  }
  .info-close:hover { color: var(--text-primary); }

  .legend {
    position: absolute; bottom: 2.75rem; right: 1.25rem; z-index: 10;
    background: var(--bg-panel); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0.75rem 1rem; font-size: 0.7rem;
    transition: opacity 0.5s;
  }
  .legend.collapsed {
    padding: 0; border: none; background: none; backdrop-filter: none;
  }
  .legend-btn {
    display: none; font-family: var(--font-mono); font-size: 0.65rem;
    letter-spacing: 0.05em; padding: 0.4rem 0.8rem; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-panel);
    backdrop-filter: blur(12px); color: var(--text-secondary);
    cursor: pointer; transition: all 0.2s;
  }
  .legend-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .legend.collapsed .legend-btn { display: block; }
  .legend.collapsed .legend-content { display: none; }
  .legend-section {
    font-family: var(--font-mono); font-size: 0.6rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--accent-cyan); margin-top: 0.5rem;
    margin-bottom: 0.25rem;
  }
  .legend-section:first-child { margin-top: 0; }
  .legend-item {
    display: flex; align-items: center; gap: 0.5rem; padding: 0.15rem 0;
    color: var(--text-secondary);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-svg { width: 22px; height: 22px; flex-shrink: 0; }
  .legend-plane-icon { width: 22px; flex-shrink: 0; font-size: 22px; line-height: 1; text-align: center; }

  .trail-toggle {
    margin-top: 0.6rem; padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.5rem;
    cursor: pointer; user-select: none;
  }
  .trail-toggle .toggle-track {
    width: 28px; height: 14px; border-radius: 7px;
    background: var(--border); position: relative; transition: background 0.2s;
    flex-shrink: 0;
  }
  .trail-toggle .toggle-track.on { background: var(--accent-cyan); }
  .trail-toggle .toggle-thumb {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--text-primary); position: absolute;
    top: 2px; left: 2px; transition: left 0.2s;
  }
  .trail-toggle .toggle-track.on .toggle-thumb { left: 16px; }
  .trail-toggle .toggle-label {
    font-family: var(--font-mono); font-size: 0.65rem;
    color: var(--text-secondary); letter-spacing: 0.04em;
  }

  .advisory-banner {
    display: none; position: absolute; top: 48px; left: 0; right: 0; z-index: 10;
    background: rgba(180, 83, 9, 0.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid #d97706;
    padding: 0.5rem 1.25rem; font-size: 0.75rem; color: #fef3c7;
    line-height: 1.4;
  }
  .advisory-banner.visible { display: flex; align-items: flex-start; gap: 0.75rem; }
  .advisory-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.05rem; }
  .advisory-text { flex: 1; }
  .advisory-dismiss {
    background: none; border: 1px solid rgba(254, 243, 199, 0.3); border-radius: 4px;
    color: #fef3c7; font-family: var(--font-mono); font-size: 0.6rem;
    padding: 0.2rem 0.5rem; cursor: pointer; flex-shrink: 0;
  }
  .advisory-dismiss:hover { border-color: #fef3c7; }

  .maplibregl-ctrl-top-right { top: 56px; }

  @media (max-width: 768px) {
    .info-panel { left: 0.75rem; right: 0.75rem; min-width: auto; max-width: none; }
    .legend { display: none; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="advisory-banner" id="advisory-banner">
  <span class="advisory-icon">&#x26A0;</span>
  <div class="advisory-text" id="advisory-text"></div>
  <button class="advisory-dismiss" onclick="_advisoryDismissed=true;document.getElementById('advisory-banner').classList.remove('visible')">Dismiss</button>
</div>

<div class="header">
  <div class="header-left">
    <a href="index.html" class="header-title">Spatial Agents</a>
    <span class="header-subtitle" id="region-subtitle">San Francisco — Live</span>
  </div>
  <div class="header-right">
    <div id="region-switcher"></div>
    <span class="entity-count"><span class="status-dot"></span><strong id="vessel-count">—</strong> vessels, <strong id="aircraft-count">—</strong> aircraft</span>
    <a href="dag.html" class="nav-link">Causal DAG</a>
    <a href="index.html" class="nav-link">Overview</a>
  </div>
</div>

<div class="info-panel" id="info">
  <button class="info-close" onclick="document.getElementById('info').classList.remove('visible')">&times;</button>
  <h3 id="info-name">—</h3>
  <div class="info-kind" id="info-kind"></div>
  <div id="info-rows"></div>
</div>

<div class="legend" id="legend">
  <button class="legend-btn" onclick="expandLegend()">Legend</button>
  <div class="legend-content">
    <div class="legend-section">Vessels</div>
    <div class="legend-item"><svg class="legend-svg" viewBox="0 0 16 16"><polygon points="8,2 10.5,10 9.5,13 6.5,13 5.5,10" transform="rotate(90 8 8)" fill="#f43f5e"/></svg>Tanker</div>
    <div class="legend-item"><svg class="legend-svg" viewBox="0 0 16 16"><polygon points="8,2 10.5,10 9.5,13 6.5,13 5.5,10" transform="rotate(90 8 8)" fill="#3b82f6"/></svg>Cargo</div>
    <div class="legend-item"><svg class="legend-svg" viewBox="0 0 16 16"><polygon points="8,2 10.5,10 9.5,13 6.5,13 5.5,10" transform="rotate(90 8 8)" fill="#10b981"/></svg>Passenger</div>
    <div class="legend-item"><svg class="legend-svg" viewBox="0 0 16 16"><polygon points="8,2 10.5,10 9.5,13 6.5,13 5.5,10" transform="rotate(90 8 8)" fill="#f59e0b"/></svg>Tug</div>
    <div class="legend-item"><svg class="legend-svg" viewBox="0 0 16 16"><polygon points="8,2 10.5,10 9.5,13 6.5,13 5.5,10" transform="rotate(90 8 8)" fill="#8b5cf6"/></svg>Fishing</div>
    <div class="legend-item"><svg class="legend-svg" viewBox="0 0 16 16"><polygon points="8,2 10.5,10 9.5,13 6.5,13 5.5,10" transform="rotate(90 8 8)" fill="#06b6d4"/></svg>Other</div>
    <div class="legend-item"><svg class="legend-svg" viewBox="0 0 16 16"><polygon points="8,2 10.5,10 9.5,13 6.5,13 5.5,10" transform="rotate(90 8 8)" fill="#64748b"/></svg>Unknown</div>
    <div class="legend-section">Aircraft</div>
    <div class="legend-item"><div class="legend-plane-icon" style="color:#22d3ee">&#x2708;</div>Departure</div>
    <div class="legend-item"><div class="legend-plane-icon" style="color:#10b981">&#x2708;</div>Climbing</div>
    <div class="legend-item"><div class="legend-plane-icon" style="color:#3b82f6">&#x2708;</div>Cruising</div>
    <div class="legend-item"><div class="legend-plane-icon" style="color:#f59e0b">&#x2708;</div>Descending</div>
    <div class="legend-item"><div class="legend-plane-icon" style="color:#f43f5e">&#x2708;</div>Approach</div>
    <div class="legend-item"><div class="legend-plane-icon" style="color:#78716c">&#x2708;</div>On Ground</div>
    <div class="legend-section">Coverage</div>
    <div class="legend-item"><div style="width:16px;height:2px;border-top:2px dashed #06b6d4;flex-shrink:0"></div>Data Collection</div>
    <div class="trail-toggle" id="trail-toggle" onclick="toggleLongTail()">
      <div class="toggle-track on" id="toggle-track"><div class="toggle-thumb"></div></div>
      <span class="toggle-label" id="toggle-label">Long Tail (~3 min)</span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const API = window.location.hostname === 'agents.specktech.com'
  ? ''
  : 'http://127.0.0.1:8012';
let H3_CELLS = [];
const RESOLUTION = 3;
const VESSEL_REFRESH_MS = 45000;
const AIRCRAFT_REFRESH_MS = 22000;
let coverageBbox = null; // set from /health API
let allRegions = {};     // from /health .regions
let activeRegion = null; // current region name
let activeCellSet = new Set(); // res-4 H3 cells (primary + buffer) for active region

const REGION_DISPLAY = {
  san_francisco: 'San Francisco',
  boston: 'Boston',
};

// External map fallback — opens provider site for regions we don't ingest
const OTHER_MAP_URL = 'https://www.marinetraffic.com/en/ais/home/centerx:56/centery:26/zoom:8';

const VESSEL_COLORS = {
  tanker: '#f43f5e', cargo: '#3b82f6', passenger: '#10b981',
  tug: '#f59e0b', fishing: '#8b5cf6', military: '#ef4444',
  sailing: '#a78bfa', pleasure: '#fb923c', high_speed: '#22d3ee',
  other: '#06b6d4', unknown: '#64748b',
};

const AIRCRAFT_COLORS = {
  approach:   '#f43f5e',
  departure:  '#22d3ee',
  climbing:   '#10b981',
  cruising:   '#3b82f6',
  descending: '#f59e0b',
  ground:     '#78716c',
};

// Flight phase comes from the server (flight_phase field).
// Fallback for compatibility if field is missing.
function getFlightPhase(a) {
  if (a.flight_phase) return a.flight_phase;
  if (a.on_ground) return 'ground';
  return 'climbing';
}

function makePlaneIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
    <text x="20" y="30" text-anchor="middle" font-size="32" fill="${color}"
          stroke="#0a0e17" stroke-width="1" paint-order="stroke"
          transform="rotate(-90 20 20)">✈</text>
  </svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function makeShipIcon(color) {
  // Boat hull shape — pointed bow at top, flat stern at bottom
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24">
    <path d="M12 3 L15 12 L14.2 17 L9.8 17 L9 12 Z"
          fill="${color}" stroke="#0a0e17" stroke-width="1.2" stroke-linejoin="round"/>
  </svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

// --- Catmull-Rom spline for smooth trails ---
// Given control points P0..P3, evaluate the curve between P1 and P2 at t=[0,1]
function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t * t, t3 = t2 * t;
  return [
    0.5 * ((2*p1[0]) + (-p0[0]+p2[0])*t + (2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2 + (-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
    0.5 * ((2*p1[1]) + (-p0[1]+p2[1])*t + (2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2 + (-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3),
  ];
}

let longTailMode = true;

function expandLegend() {
  const el = document.getElementById('legend');
  el.classList.remove('collapsed');
  clearTimeout(window._legendTimer);
  window._legendTimer = setTimeout(() => el.classList.add('collapsed'), 5000);
}

setTimeout(() => document.getElementById('legend').classList.add('collapsed'), 5000);

function toggleLongTail() {
  longTailMode = !longTailMode;
  document.getElementById('toggle-track').classList.toggle('on', longTailMode);
  document.getElementById('toggle-label').textContent = longTailMode ? 'Long Tail (~3 min)' : 'Short Tail (~45s)';
  // Re-render trails with current data
  if (lastVesselEntities) updateVessels(lastVesselEntities);
  if (lastAircraftEntities) updateAircraft(lastAircraftEntities);
}

// Short tail: smooth curve from previous to current position only,
// shaped by all available control points.
function shortTrail(track, color) {
  if (!track || track.length < 2) return null;
  const n = track.length;
  const p0 = n >= 3 ? track[n - 3] : track[n - 2];
  const p1 = track[n - 2];
  const p2 = track[n - 1];
  const p3 = [2 * p2[0] - p1[0], 2 * p2[1] - p1[1]];

  const steps = 12;
  const coords = [];
  for (let i = 0; i <= steps; i++) {
    coords.push(catmullRom(p0, p1, p2, p3, i / steps));
  }
  return {
    type: 'Feature',
    geometry: { type: 'LineString', coordinates: coords },
    properties: { color },
  };
}

// Long tail: Catmull-Rom spline through ALL available track points.
function longTrail(track, color) {
  if (!track || track.length < 2) return null;
  const coords = [];
  const steps = 10;
  for (let seg = 0; seg < track.length - 1; seg++) {
    const p0 = track[Math.max(seg - 1, 0)];
    const p1 = track[seg];
    const p2 = track[seg + 1];
    const p3 = seg + 2 < track.length ? track[seg + 2] : [2 * p2[0] - p1[0], 2 * p2[1] - p1[1]];
    for (let i = 0; i <= steps; i++) {
      // Avoid duplicate point at segment joins
      if (seg > 0 && i === 0) continue;
      coords.push(catmullRom(p0, p1, p2, p3, i / steps));
    }
  }
  return {
    type: 'Feature',
    geometry: { type: 'LineString', coordinates: coords },
    properties: { color },
  };
}

function buildTrailFeatures(entities, colorFn) {
  const trailFn = longTailMode ? longTrail : shortTrail;
  const features = [];
  for (const e of entities) {
    const trail = trailFn(e.track, colorFn(e));
    if (trail) features.push(trail);
  }
  return { type: 'FeatureCollection', features };
}

let lastVesselEntities = null;
let lastAircraftEntities = null;

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'carto-dark': {
        type: 'raster',
        tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
        tileSize: 256,
        attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
      }
    },
    layers: [{
      id: 'carto-dark', type: 'raster', source: 'carto-dark',
      minzoom: 0, maxzoom: 19,
    }],
  },
  center: [-122.29, 37.725],
  zoom: 8.5,
  maxZoom: 18,
  minZoom: 4,
});

function fitToCoverage() {
  if (!coverageBbox) return;
  const bounds = [[coverageBbox.min_lng, coverageBbox.min_lat], [coverageBbox.max_lng, coverageBbox.max_lat]];
  map.fitBounds(bounds, { padding: { top: 56, bottom: 16, left: 16, right: 16 }, maxZoom: 14 });
}
window.addEventListener('resize', () => { clearTimeout(window._resizeTimer); window._resizeTimer = setTimeout(fitToCoverage, 200); });

map.addControl(new maplibregl.NavigationControl(), 'top-right');

function vesselToFeature(v) {
  const color = VESSEL_COLORS[v.vessel_type] || VESSEL_COLORS.unknown;
  const hdg = (v.heading_deg != null && v.heading_deg !== 511) ? v.heading_deg : (v.course_deg || 0);
  return {
    feature: {
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [v.position.lng, v.position.lat] },
      properties: {
        kind: 'vessel', id: v.mmsi, name: v.name || 'Unknown',
        vessel_type: v.vessel_type || 'unknown',
        speed: v.speed_knots, heading: v.heading_deg, course: v.course_deg,
        destination: v.destination || '', timestamp: v.position.timestamp,
        color: color, track_points: v.track_points || 0,
        rotation: hdg,
      },
    },
    track: v.track || [],
    color: color,
    h3_cells: v.h3_cells || null,
  };
}

function aircraftToFeature(a) {
  const hdg = a.heading_deg != null ? a.heading_deg : 0;
  const phase = getFlightPhase(a);
  const color = AIRCRAFT_COLORS[phase];
  return {
    feature: {
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [a.position.lng, a.position.lat] },
      properties: {
        kind: 'aircraft', id: a.icao24, name: a.callsign || a.icao24,
        callsign: a.callsign || '', icao24: a.icao24,
        category: a.category || 'unknown', phase: phase, color: color,
        speed: a.velocity_knots, heading: hdg,
        altitude: a.position.alt_m != null ? Math.round(a.position.alt_m * 3.28084) : null,
        vertical_rate: a.vertical_rate_fpm, on_ground: a.on_ground,
        squawk: a.squawk || '', timestamp: a.position.timestamp, rotation: hdg,
        track_points: a.track_points || 0,
      },
    },
    track: a.track || [],
    color: color,
    h3_cells: a.h3_cells || null,
  };
}

function entityRes4Cell(e) {
  // Each entity carries h3_cells: { "4": "8428...", ... } populated by
  // vesselToFeature / aircraftToFeature.
  const cells = e && e.h3_cells;
  if (!cells) return null;
  return cells['4'] || cells[4] || null;
}

function countInActiveCells(entities) {
  if (!entities) return 0;
  if (!activeCellSet || activeCellSet.size === 0) {
    // Fallback to bbox membership while cells are not yet loaded
    const b = coverageBbox;
    if (!b) return entities.length;
    let n = 0;
    for (const e of entities) {
      const [lng, lat] = e.feature.geometry.coordinates;
      if (lat >= b.min_lat && lat <= b.max_lat && lng >= b.min_lng && lng <= b.max_lng) n++;
    }
    return n;
  }
  let n = 0;
  for (const e of entities) {
    const cell = entityRes4Cell(e);
    if (cell && activeCellSet.has(cell)) n++;
  }
  return n;
}

function updateCounts() {
  document.getElementById('vessel-count').textContent = countInActiveCells(lastVesselEntities);
  document.getElementById('aircraft-count').textContent = countInActiveCells(lastAircraftEntities);
}

async function fetchVessels() {
  try {
    const data = await fetch(`${API}/api/vessels`).then(r => r.json());
    return data.vessels.map(v => vesselToFeature(v));
  } catch (e) { console.error('Vessel fetch error:', e); return null; }
}

async function fetchAircraft() {
  try {
    const data = await fetch(`${API}/api/aircraft`).then(r => r.json());
    return data.aircraft.map(a => aircraftToFeature(a));
  } catch (e) { console.error('Aircraft fetch error:', e); return null; }
}

function showVesselInfo(p) {
  document.getElementById('info-name').textContent = p.name;
  const kind = document.getElementById('info-kind');
  kind.textContent = 'Vessel';
  kind.className = 'info-kind vessel';
  const rows = [
    ['MMSI', p.id], ['Type', p.vessel_type],
    ['Speed', p.speed != null ? Number(p.speed).toFixed(1) + ' kn' : '—'],
    ['Heading', (p.heading != null && p.heading !== 511) ? Number(p.heading).toFixed(0) + '\u00B0' : '—'],
    ['Course', p.course != null ? Number(p.course).toFixed(0) + '\u00B0' : '—'],
    ['Destination', p.destination || '—'],
    ['Updated', p.timestamp ? new Date(p.timestamp).toLocaleTimeString() : '—'],
  ];
  document.getElementById('info-rows').innerHTML = rows.map(([l, v]) =>
    `<div class="info-row"><span class="info-label">${l}</span><span class="info-value">${v}</span></div>`
  ).join('');
  document.getElementById('info').classList.add('visible');
}

function showAircraftInfo(p) {
  document.getElementById('info-name').textContent = p.callsign || p.icao24;
  const kind = document.getElementById('info-kind');
  kind.textContent = 'Aircraft';
  kind.className = 'info-kind aircraft';
  const alt = p.altitude != null ? Number(p.altitude).toLocaleString() + ' ft' : '—';
  const vr = p.vertical_rate != null ? (Number(p.vertical_rate) >= 0 ? '+' : '') + Number(p.vertical_rate).toFixed(0) + ' fpm' : '—';
  const phase = p.phase || 'climbing';
  const rows = [
    ['ICAO24', p.icao24], ['Callsign', p.callsign || '—'],
    ['Phase', phase.charAt(0).toUpperCase() + phase.slice(1)],
    ['Speed', p.speed != null ? Number(p.speed).toFixed(0) + ' kn' : '—'],
    ['Altitude', alt], ['Vert Rate', vr],
    ['Heading', p.heading != null ? Number(p.heading).toFixed(0) + '\u00B0' : '—'],
    ['Squawk', p.squawk || '—'],
    ['On Ground', p.on_ground === true || p.on_ground === 'true' ? 'Yes' : 'No'],
    ['Updated', p.timestamp ? new Date(p.timestamp).toLocaleTimeString() : '—'],
  ];
  document.getElementById('info-rows').innerHTML = rows.map(([l, v]) =>
    `<div class="info-row"><span class="info-label">${l}</span><span class="info-value">${v}</span></div>`
  ).join('');
  document.getElementById('info').classList.add('visible');
}

// --- Source & layer management ---
let layersInitialized = false;

function setSourceData(id, geojson) {
  const src = map.getSource(id);
  if (src) src.setData(geojson);
  else map.addSource(id, { type: 'geojson', data: geojson });
}

function updateVessels(entities) {
  if (!entities) return;
  lastVesselEntities = entities;
  setSourceData('vessels', { type: 'FeatureCollection', features: entities.map(e => e.feature) });
  setSourceData('vessel-trails', buildTrailFeatures(entities, e => e.color));
  updateCounts();
}

function updateAircraft(entities) {
  if (!entities) return;
  lastAircraftEntities = entities;
  setSourceData('aircraft', { type: 'FeatureCollection', features: entities.map(e => e.feature) });
  setSourceData('aircraft-trails', buildTrailFeatures(entities, e => e.color));
  updateCounts();
}

function initLayers() {
  if (layersInitialized) return;
  layersInitialized = true;

  // --- Trail layers (drawn first, underneath dots/icons) ---
  map.addLayer({
    id: 'vessel-trail-lines', type: 'line', source: 'vessel-trails',
    paint: {
      'line-color': ['get', 'color'],
      'line-width': ['interpolate', ['linear'], ['zoom'], 8, 1, 12, 2, 16, 3],
      'line-opacity': 0.4,
    },
  });
  map.addLayer({
    id: 'aircraft-trail-lines', type: 'line', source: 'aircraft-trails',
    paint: {
      'line-color': ['get', 'color'],
      'line-width': ['interpolate', ['linear'], ['zoom'], 8, 1, 12, 1.5, 16, 2.5],
      'line-opacity': 0.35,
    },
  });

  // --- Vessel layers (loaded via ship icons) ---
  const vesselTypes = Object.entries(VESSEL_COLORS);
  let vesselIconsLoaded = 0;

  function addVesselLayers() {
    map.addLayer({
      id: 'vessel-icons', type: 'symbol', source: 'vessels',
      layout: {
        'icon-image': ['concat', 'ship-', ['get', 'vessel_type']],
        'icon-size': ['interpolate', ['linear'], ['zoom'], 4, 0.91, 6, 1.0, 8, 1.11, 12, 1.31, 16, 1.61],
        'icon-rotate': ['get', 'rotation'],
        'icon-rotation-alignment': 'map',
        'icon-allow-overlap': true,
      },
    });
    map.addLayer({
      id: 'vessel-labels', type: 'symbol', source: 'vessels', minzoom: 13,
      layout: {
        'text-field': ['get', 'name'], 'text-size': 11,
        'text-offset': [0, 1.4], 'text-anchor': 'top',
        'text-font': ['Open Sans Regular'],
      },
      paint: {
        'text-color': '#94a3b8', 'text-halo-color': '#0a0e17', 'text-halo-width': 1,
      },
    });
  }

  vesselTypes.forEach(([type, color]) => {
    const img = new Image(28, 28);
    img.onload = () => {
      map.addImage(`ship-${type}`, img);
      vesselIconsLoaded++;
      if (vesselIconsLoaded === vesselTypes.length) addVesselLayers();
    };
    img.src = makeShipIcon(color);
  });

  // --- Aircraft layers ---
  const phases = Object.entries(AIRCRAFT_COLORS);
  let loadedCount = 0;

  function addAircraftLayers() {
    map.addLayer({
      id: 'aircraft-icons', type: 'symbol', source: 'aircraft',
      filter: ['!=', ['get', 'phase'], 'ground'],
      layout: {
        'icon-image': ['concat', 'plane-', ['get', 'phase']],
        'icon-size': ['interpolate', ['linear'], ['zoom'], 4, 0.48, 6, 0.55, 8, 0.65, 12, 0.8, 16, 1.0],
        'icon-rotate': ['get', 'rotation'],
        'icon-rotation-alignment': 'map',
        'icon-allow-overlap': true,
      },
    });
    map.addLayer({
      id: 'aircraft-ground', type: 'symbol', source: 'aircraft',
      filter: ['==', ['get', 'phase'], 'ground'],
      layout: {
        'icon-image': 'plane-ground',
        'icon-size': ['interpolate', ['linear'], ['zoom'], 4, 0.38, 6, 0.45, 8, 0.53, 12, 0.65, 16, 0.85],
        'icon-rotate': ['get', 'rotation'],
        'icon-rotation-alignment': 'map',
        'icon-allow-overlap': true,
      },
      paint: { 'icon-opacity': 0.7 },
    });
    map.addLayer({
      id: 'aircraft-labels', type: 'symbol', source: 'aircraft', minzoom: 12,
      layout: {
        'text-field': ['get', 'name'], 'text-size': 10,
        'text-offset': [0, 1.2], 'text-anchor': 'top',
        'text-font': ['Open Sans Regular'],
      },
      paint: {
        'text-color': ['get', 'color'],
        'text-halo-color': '#0a0e17', 'text-halo-width': 1,
      },
    });
  }

  phases.forEach(([phase, color]) => {
    const img = new Image(40, 40);
    img.onload = () => {
      map.addImage(`plane-${phase}`, img);
      loadedCount++;
      if (loadedCount === phases.length) addAircraftLayers();
    };
    img.src = makePlaneIcon(color);
  });

  // --- Click handlers ---
  map.on('click', 'vessel-icons', (e) => showVesselInfo(e.features[0].properties));
  map.on('click', 'aircraft-icons', (e) => showAircraftInfo(e.features[0].properties));
  map.on('click', 'aircraft-ground', (e) => showAircraftInfo(e.features[0].properties));

  ['vessel-icons', 'aircraft-icons', 'aircraft-ground'].forEach(layer => {
    map.on('mouseenter', layer, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', layer, () => { map.getCanvas().style.cursor = ''; });
  });
}

// --- Init & polling ---
let _advisoryDismissed = false;

function updateAdvisories(advisories) {
  const banner = document.getElementById('advisory-banner');
  if (advisories.length && !_advisoryDismissed) {
    document.getElementById('advisory-text').innerHTML = advisories.join('<br>');
    banner.classList.add('visible');
  } else if (!advisories.length) {
    banner.classList.remove('visible');
    _advisoryDismissed = false; // reset dismiss if advisories clear
  }
}

async function refreshAdvisories() {
  try {
    const res = await fetch(`${API}/health`);
    const health = await res.json();
    if (health.regions) allRegions = health.regions;
    const regionData = activeRegion && allRegions[activeRegion] ? allRegions[activeRegion] : health.coverage;
    updateAdvisories(regionData.advisories || []);
  } catch (e) { console.error('Advisory refresh error:', e); }
}

// Build a FeatureCollection of res-4 H3 cells for ALL active regions.
// One feature per cell, properties carry { region, kind } where
// kind ∈ {primary, buffer}. The active region is highlighted via paint
// expressions that key on the `region` property.
function buildCoverageFeatures() {
  const feats = [];
  for (const [name, region] of Object.entries(allRegions || {})) {
    const polys = (region && region.geometry && region.geometry.coordinates) || [];
    polys.forEach((poly, idx) => {
      feats.push({
        type: 'Feature',
        geometry: { type: 'Polygon', coordinates: poly },
        properties: {
          region: name,
          kind: idx === 0 ? 'primary' : 'buffer',
        },
      });
    });
  }
  return { type: 'FeatureCollection', features: feats };
}

function updateCoverageCells() {
  const src = map.getSource('coverage-cells');
  if (src) src.setData(buildCoverageFeatures());
  // Restyle layers to spotlight the active region.
  if (map.getLayer('coverage-cells-fill')) {
    map.setPaintProperty('coverage-cells-fill', 'fill-opacity', [
      'case', ['==', ['get', 'region'], activeRegion || ''], 0.10, 0.0,
    ]);
  }
  if (map.getLayer('coverage-cells-line-primary')) {
    map.setPaintProperty('coverage-cells-line-primary', 'line-opacity', [
      'case', ['==', ['get', 'region'], activeRegion || ''], 0.85, 0.30,
    ]);
  }
  if (map.getLayer('coverage-cells-line-buffer')) {
    map.setPaintProperty('coverage-cells-line-buffer', 'line-opacity', [
      'case', ['==', ['get', 'region'], activeRegion || ''], 0.55, 0.20,
    ]);
  }
}

function activeCellsForRegion(name) {
  const r = allRegions[name];
  if (!r) return new Set();
  const cells = [r.primary_cell, ...(r.buffer_cells || [])].filter(Boolean);
  return new Set(cells);
}

function switchRegion(name) {
  if (!allRegions[name]) return;
  activeRegion = name;
  const region = allRegions[name];
  coverageBbox = region.bbox;
  H3_CELLS = region.h3_cells[String(RESOLUTION)] || [];
  activeCellSet = activeCellsForRegion(name);

  // Update UI
  document.getElementById('region-subtitle').textContent = (REGION_DISPLAY[name] || name) + ' — Live';
  document.querySelectorAll('.region-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.region === name);
  });

  // Navigate the map to this region
  updateCoverageCells();
  fitToCoverage();

  // Recompute counts for the new active region (data itself is unchanged)
  updateCounts();

  // Show per-region advisories (vessel/aircraft data already on map from all regions)
  _advisoryDismissed = false;
  updateAdvisories(region.advisories || []);
}

map.on('load', async () => {
  // Fetch coverage and H3 cells from server
  try {
    const healthRes = await fetch(`${API}/health`);
    const health = await healthRes.json();
    allRegions = health.regions || {};
    const defaultRegion = Object.keys(allRegions)[0] || health.coverage.region;
    activeRegion = defaultRegion;
    coverageBbox = allRegions[defaultRegion] ? allRegions[defaultRegion].bbox : health.coverage.bbox;
    H3_CELLS = (allRegions[defaultRegion] ? allRegions[defaultRegion].h3_cells : health.coverage.h3_cells)[String(RESOLUTION)] || [];
    activeCellSet = activeCellsForRegion(defaultRegion);
    updateAdvisories((allRegions[defaultRegion] || health.coverage).advisories || []);

    // Build region switcher buttons
    const switcher = document.getElementById('region-switcher');
    Object.keys(allRegions).forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'region-btn' + (name === defaultRegion ? ' active' : '');
      btn.dataset.region = name;
      btn.textContent = REGION_DISPLAY[name] || name;
      btn.onclick = () => switchRegion(name);
      switcher.appendChild(btn);
    });

    // "Other" button — redirects to external provider map for regions we don't ingest
    const otherBtn = document.createElement('button');
    otherBtn.className = 'region-btn';
    otherBtn.textContent = 'Other';
    otherBtn.onclick = () => { window.open(OTHER_MAP_URL, '_blank', 'noopener'); };
    switcher.appendChild(otherBtn);
    document.getElementById('region-subtitle').textContent = (REGION_DISPLAY[defaultRegion] || defaultRegion) + ' — Live';
  } catch (e) {
    console.error('Failed to fetch coverage from /health, using defaults', e);
    coverageBbox = { min_lat: 37.25, max_lat: 38.2, min_lng: -122.78, max_lng: -121.8 };
    H3_CELLS = [];
  }

  // Fit map to coverage area
  fitToCoverage();

  // Draw coverage as the 7-cell H3 region tile (primary + 6 buffer cells)
  // for every active region. The active region is highlighted; inactive
  // regions are drawn dimmer so users can still see the multi-region tile
  // structure. Filtering by `kind` gives primary cells a solid outline and
  // buffer cells a dashed outline.
  map.addSource('coverage-cells', {
    type: 'geojson',
    data: buildCoverageFeatures(),
  });
  map.addLayer({
    id: 'coverage-cells-fill', type: 'fill', source: 'coverage-cells',
    paint: {
      'fill-color': '#06b6d4',
      'fill-opacity': [
        'case', ['==', ['get', 'region'], activeRegion || ''], 0.10, 0.0,
      ],
    },
  });
  map.addLayer({
    id: 'coverage-cells-line-primary', type: 'line', source: 'coverage-cells',
    filter: ['==', ['get', 'kind'], 'primary'],
    paint: {
      'line-color': '#06b6d4',
      'line-width': 2,
      'line-opacity': [
        'case', ['==', ['get', 'region'], activeRegion || ''], 0.85, 0.30,
      ],
    },
  });
  map.addLayer({
    id: 'coverage-cells-line-buffer', type: 'line', source: 'coverage-cells',
    filter: ['==', ['get', 'kind'], 'buffer'],
    paint: {
      'line-color': '#06b6d4',
      'line-width': 1.2,
      'line-dasharray': [3, 3],
      'line-opacity': [
        'case', ['==', ['get', 'region'], activeRegion || ''], 0.55, 0.20,
      ],
    },
  });

  // Initialize empty sources so layers can be added
  const empty = { type: 'FeatureCollection', features: [] };
  setSourceData('vessels', empty);
  setSourceData('aircraft', empty);
  setSourceData('vessel-trails', empty);
  setSourceData('aircraft-trails', empty);
  initLayers();

  // Initial fetch
  const [vessels, aircraft] = await Promise.all([fetchVessels(), fetchAircraft()]);
  updateVessels(vessels);
  updateAircraft(aircraft);

  // Separate intervals
  setInterval(async () => { updateVessels(await fetchVessels()); }, VESSEL_REFRESH_MS);
  setInterval(async () => { updateAircraft(await fetchAircraft()); }, AIRCRAFT_REFRESH_MS);
  setInterval(refreshAdvisories, 300000); // 5 minutes
});
</script>
